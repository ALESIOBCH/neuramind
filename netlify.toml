[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/teste"
  to   = "/teste.html"
  status = 200

[[redirects]]
  from = "/privacidade"
  to   = "/privacidade.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"